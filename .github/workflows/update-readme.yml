name: Auto-update Root README Summary

on:
  push:
    paths:
      - "**/README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permesso esplicito di scrittura
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project Grid
        run: |
          echo "Building table..."
          HEADER="| Type | Tool | Description | Status |"
          SEPARATOR="| :---: | :--- | :--- | :--- |"
          ROWS=""

          # Scansione sottocartelle
          for dir in */; do
            foldername=${dir%/}
            if [[ "$foldername" == .* ]] || [[ "$foldername" == "monkeyjob" ]]; then continue; fi
            
            if [ -f "$dir/README.md" ]; then
              # Estrazione Icona
              icon=$(grep -oE "[[:unicode:]]|[\x{1F300}-\x{1F9FF}]" "$dir/README.md" | head -n 1 || echo "📂")
              # Estrazione Descrizione (rimuove i pipe per non rompere la tabella)
              desc=$(grep -v '^#' "$dir/README.md" | grep -v '^$' | head -n 1 | sed 's/|/\\|/g')
              # Estrazione Status
              stat=$(grep -i "Status:" "$dir/README.md" | cut -d':' -f2 | xargs || echo "Stable")
              
              ROWS="${ROWS}\n| $icon | [**$foldername**](./$dir) | $desc | $stat |"
            fi
          done

          # Creazione file tabella temporaneo
          echo -e "$HEADER\n$SEPARATOR$ROWS" > table_content.txt

          # Debug: Mostra cosa è stato generato nei log di GitHub
          cat table_content.txt

          # Sostituzione mirata usando sed (più semplice di perl in questo caso)
          sed -i '//,//{ //{n; r table_content.txt
          }; //p; d; }' README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory summary [automated]"
