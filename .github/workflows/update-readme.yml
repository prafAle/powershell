name: Auto-update Root README Summary

on:
  push:
    paths:
      - "**/README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project Grid
        run: |
          # 1. Trova il README della root (indipendentemente da maiuscole/minuscole)
          ROOT_README=$(find . -maxdepth 1 -iname "readme.md" | head -n 1)
          
          if [ -z "$ROOT_README" ]; then
            echo "Error: Root README.md not found!"
            exit 1
          fi

          echo "Building table for: $ROOT_README"
          HEADER="| Type | Tool | Description | Status |"
          SEPARATOR="| :---: | :--- | :--- | :--- |"
          ROWS=""

          # 2. Scansione sottocartelle (escludendo cartelle nascoste e monkeyjob)
          for dir in */; do
            foldername=${dir%/}
            if [[ "$foldername" == .* ]] || [[ "$foldername" == "monkeyjob" ]]; then continue; fi
            
            # Cerca README all'interno della sottocartella
            SUB_README=$(find "$dir" -maxdepth 1 -iname "readme.md" | head -n 1)
            
            if [ -f "$SUB_README" ]; then
              # Estrazione Icona
              icon=$(grep -oE "[[:unicode:]]|[\x{1F300}-\x{1F9FF}]" "$SUB_README" | head -n 1 || echo "📂")
              # Estrazione Descrizione (rimuove i pipe per la tabella)
              desc=$(grep -v '^#' "$SUB_README" | grep -v '^$' | head -n 1 | sed 's/|/\\|/g' | xargs)
              # Estrazione Status
              stat=$(grep -i "Status:" "$SUB_README" | cut -d':' -f2 | xargs || echo "Stable")
              
              ROWS="${ROWS}\n| $icon | [**$foldername**](./$dir) | $desc | $stat |"
            fi
          done

          # 3. Creazione file temporaneo con la tabella
          echo -e "$HEADER\n$SEPARATOR$ROWS" > table_content.txt

          # 4. Iniezione nel README con gestione del pattern non trovato
          if grep -q "" "$ROOT_README"; then
            sed -i '//,//{ //{n; r table_content.txt
            }; //p; d; }' "$ROOT_README"
            echo "Successfully updated $ROOT_README"
          else
            echo "Warning: Tags not found in $ROOT_README. Skipping injection."
          fi

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory summary [automated]"
