name: Auto-update Root README Summary

# Il workflow si attiva su ogni push che modifica un README nelle sottocartelle
on:
  push:
    paths:
      - "**/README.md"
  workflow_dispatch: # Permette l'avvio manuale dalla scheda Actions

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project Grid
        run: |
          # ===========================================================================
          # CONFIGURAZIONE ELEMENTI (MODIFICABILI)
          # ===========================================================================
          DEFAULT_ICON="📂"         # Icona di default se non trovata nel README
          TABLE_HEADER="| Type | Tool | Description | Status |"
          TABLE_SEP="| :---: | :--- | :--- | :--- |"
          # ===========================================================================

          echo "Generating project summaries..."
          
          CONTENT="$TABLE_HEADER\n$TABLE_SEP"

          # Scansione delle sottocartelle
          for dir in */; do
            foldername=${dir%/}
            
            # Elabora solo se esiste un README.md interno
            if [ -f "$dir/README.md" ]; then
              
              # 1. ESTRAZIONE ICONA: Cerca una emoji all'inizio del file README
              icon=$(grep -oE "[[:unicode:]]|[\x{1F300}-\x{1F9FF}]" "$dir/README.md" | head -n 1 || echo "$DEFAULT_ICON")
              
              # 2. ESTRAZIONE DESCRIZIONE: Prende la prima riga di testo (non titolo)
              description=$(grep -v '^#' "$dir/README.md" | grep -v '^$' | head -n 1 | sed 's/|/\\|/g')
              
              # 3. ESTRAZIONE STATUS: Cerca la riga "Status:"
              status=$(grep -i "Status:" "$dir/README.md" | cut -d':' -f2 | xargs || echo "Unknown")
              
              # Costruzione riga tabella
              CONTENT="$CONTENT\n| $icon | [**$foldername**](./$dir) | $description | $status |"
            fi
          done

          # Iniezione del contenuto nel README.md tramite Perl (gestisce multi-riga)
          perl -0777 -i -pe "s/().*()/\$1\n$CONTENT\n\$2/sg" README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory summary [automated]"
