name: Auto-update Root README Summary

on:
  push:
    paths:
      - "**/README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project Grid
        run: |
          ROOT_README=$(find . -maxdepth 1 -iname "readme.md" | head -n 1)
          
          HEADER="| Type | Tool | Description | Status |"
          SEP="| :---: | :--- | :--- | :--- |"
          ROWS=""

          for dir in */; do
            foldername=${dir%/}
            if [[ "$foldername" == .* ]] || [[ "$foldername" == "monkeyjob" ]]; then continue; fi
            
            SUB_README=$(find "$dir" -maxdepth 1 -iname "readme.md" | head -n 1)
            if [ -f "$SUB_README" ]; then
              icon=$(grep -o -m 1 "[^[:alnum:][:space:][:punct:]]" "$SUB_README" | head -n 1 || echo "📂")
              desc=$(grep -v '^#' "$SUB_README" | grep -v '^$' | head -n 1 | sed 's/|/\\|/g' | xargs)
              stat=$(grep -i "Status:" "$SUB_README" | cut -d':' -f2 | xargs || echo "Stable")
              ROWS="${ROWS}\n| $icon | [**$foldername**](./$dir) | $desc | $stat |"
            fi
          done

          # Prepariamo la tabella completa inclusi i tag
          echo -e "\n$HEADER\n$SEP$ROWS\n" > new_table.txt

          # VERSIONE CORRETTA: Sostituzione mirata del blocco tag-to-tag
          export TABLE_CONTENT=$(cat new_table.txt)
          perl -0777 -i -pe 'BEGIN{$table=$ENV{TABLE_CONTENT}} s/.*?/$table/sg' "$ROOT_README"
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory summary [automated]"
          file_pattern: '.'
          status_options: '--untracked-files=no'
          repository: .
