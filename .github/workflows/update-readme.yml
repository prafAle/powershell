name: Auto-update Root README Summary

on:
  push:
    paths:
      - "**/README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project Grid
        run: |
          ROOT_README=$(find . -maxdepth 1 -iname "readme.md" | head -n 1)
          if [ -z "$ROOT_README" ]; then exit 1; fi

          HEADER="| Type | Tool | Description | Status |"
          SEPARATOR="| :---: | :--- | :--- | :--- |"
          ROWS=""

          for dir in */; do
            foldername=${dir%/}
            if [[ "$foldername" == .* ]] || [[ "$foldername" == "monkeyjob" ]]; then continue; fi
            
            SUB_README=$(find "$dir" -maxdepth 1 -iname "readme.md" | head -n 1)
            if [ -f "$SUB_README" ]; then
              icon=$(grep -o -m 1 "[^[:alnum:][:space:][:punct:]]" "$SUB_README" | head -n 1 || echo "📂")
              desc=$(grep -v '^#' "$SUB_README" | grep -v '^$' | head -n 1 | sed 's/|/\\|/g' | xargs)
              stat=$(grep -i "Status:" "$SUB_README" | cut -d':' -f2 | xargs || echo "Stable")
              ROWS="${ROWS}\n| $icon | [**$foldername**](./$dir) | $desc | $stat |"
            fi
          done

          # Costruiamo la tabella in una variabile
          TABLE=$(echo -e "$HEADER\n$SEPARATOR$ROWS")

          # Usiamo un trucco con AWK: è molto più affidabile di SED per sostituire blocchi di testo
          awk -v r="$TABLE" '
            BEGIN {p=1}
            // {print; print r; p=0}
            // {p=1}
            p' "$ROOT_README" > temp_readme.md && mv temp_readme.md "$ROOT_README"

- name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory summary [automated]"
          # Usiamo il punto per dire "aggiungi tutto quello che è cambiato"
          file_pattern: '.' 
          status_options: '--untracked-files=no'
          # Forza l'uso del file corretto rilevato dallo script
          repository: .
